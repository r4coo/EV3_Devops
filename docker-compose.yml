services:
  frontend:
    build:
      context: ./frontend
      dockerfile: frontend.dockerfile
    ports:
      - "3000:3000"
    networks:
      - red-interna
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: backend.dockerfile
    environment:
      - DB_HOST=database
      - DB_PORT=5432
    ports:
      - "80:80"
    volumes:
      - backend-data:/app/data  # Persistencia solicitada
    networks:
      - red-interna
    depends_on:
      - database

  database:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=innovatech
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret_pass
    volumes:
      - db-store:/var/lib/postgresql/data # Persistencia de base de datos
    networks:
      - red-interna

volumes:
  backend-data:      # Named volume (Volumen nombrado)
  db-store:

networks:
  red-interna:
    driver: bridge